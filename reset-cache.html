<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refreshing Tidewise</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #eef8ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 40% 30%, rgba(35, 215, 255, 0.16), transparent 32%), #06111f;
      }

      main {
        max-width: 520px;
        padding: 28px;
        text-align: center;
        background: rgba(9, 22, 39, 0.86);
        border: 1px solid rgba(137, 196, 212, 0.28);
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #9fb6c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Loading the atlas redesign</h1>
      <p>Clearing the old Tidewise cache and opening the new satellite map interface.</p>
    </main>
    <script>
      async function resetAndGo() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.location.replace("/?atlas-redesign=" + Date.now());
      }

      resetAndGo();
    </script>
  </body>
</html>
